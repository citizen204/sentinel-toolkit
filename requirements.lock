# Runtime dependency lock for the container image.
#
# Applied by the Dockerfile as pip constraints, so the image ships the exact
# transitive versions that were tested rather than whatever resolves on build
# day. The supply-chain workflow re-checks the built image against this file.
#
# Regenerate: pip install . into a clean venv, then
#   pip freeze --exclude-editable | grep -iv '^sentinel' > requirements.lock
# Dev/test extras are deliberately excluded - they never reach the image.
#
# Two entries do not correspond one-to-one with the Linux image, and both are
# intentional. Constraints only bind packages that are actually installed, so a
# listed-but-absent entry is inert:
#   [base] ships preinstalled in python:3.11-slim rather than being ours.
#   [win]  is a Windows-only marker dependency, absent from the image.
